version: 2

project_name: pocketbase-ha

before:
  hooks:
    - go mod tidy

builds:
  - id: build_noncgo    
    binary: pocketbase-ha
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - s390x
      - ppc64le
    goarm:
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: ppc64le
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: ppc64le

archives:
  - id: archive_noncgo
    builds: [build_noncgo]
    format: zip
    files:
      - LICENSE

changelog:
  disable: true

release:  
  github:
    owner: litesql
    name: pocketbase-ha

  draft: false
